name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests and quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: deep_thought_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deep_thought_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: deep_thought_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
      DEEP_THOUGHT_USER_ID: ci-user
      # Tests mock all model and external-integration calls. Do not add real
      # API keys, Google OAuth credentials, or WhatsApp session files here.
      OPENAI_API_KEY: replace_with_your_openai_api_key
      ANTHROPIC_API_KEY: replace_with_your_anthropic_api_key
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m compileall -q Agent_Definations Server api mcp_servers scripts *.py

      - name: Check critical lint issues
        # Start with errors that can break execution. Broader style cleanup is
        # tracked separately so existing legacy style issues do not block
        # defect-detection CI from day one.
        run: ruff check --select=E9,F63,F7,F82 .

      - name: Run unit and PostgreSQL integration tests
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Verify no whitespace errors
        run: git diff --check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed credentials
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

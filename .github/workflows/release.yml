name: Release validation

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-and-release:
    name: Verify release and publish source archive
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: deep_thought_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deep_thought_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: deep_thought_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
      DEEP_THOUGHT_USER_ID: ci-user
      OPENAI_API_KEY: replace_with_your_openai_api_key
      ANTHROPIC_API_KEY: replace_with_your_anthropic_api_key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Run full release test suite
        run: |
          python -m compileall -q Agent_Definations Server api mcp_servers scripts *.py
          ruff check --select=E9,F63,F7,F82 .
          pytest --cov=. --cov-report=term-missing

      - name: Build source archive and checksum
        run: |
          git archive --format=tar.gz --output=deep-thought-${{ github.ref_name }}.tar.gz ${{ github.sha }}
          shasum -a 256 deep-thought-${{ github.ref_name }}.tar.gz > deep-thought-${{ github.ref_name }}.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            deep-thought-${{ github.ref_name }}.tar.gz
            deep-thought-${{ github.ref_name }}.tar.gz.sha256

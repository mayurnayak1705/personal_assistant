<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight JS -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<!-- Ambient background glow -->
<div class="ambient" aria-hidden="true">
    <div class="orb orb-blue"></div>
    <div class="orb orb-purple"></div>
    <div class="grain"></div>
</div>

<div class="app">

    <!-- ================= Top Bar ================= -->
    <header class="topbar">

        <div class="brand">
            <div class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"
                          fill="url(#brandGrad)"/>
                    <defs>
                        <linearGradient id="brandGrad" x1="3" y1="2" x2="21" y2="20">
                            <stop stop-color="#60a5fa"/>
                            <stop offset="1" stop-color="#a78bfa"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="brand-name">Deep Thought</span>
        </div>

        <div class="topbar-actions">
            <button class="ghost-btn" id="notifBtn" aria-label="Notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
                </svg>
                <span class="notif-dot" id="notifDot"></span>
            </button>

            <button class="ghost-btn" id="settingsBtn" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h0a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h0a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v0a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>
                </svg>
            </button>
        </div>

    </header>

    <!-- Floating notification card -->
    <div class="notice hidden" id="notice" role="status" aria-live="polite">
        <span class="notice-icon" id="noticeIcon">✦</span>
        <span class="notice-text" id="noticeText">Memory Ready</span>
    </div>

    <!-- ================= Main ================= -->
    <main class="stage">

        <!-- Welcome -->
        <section class="welcome" id="welcomeScreen">
            <div class="halo" aria-hidden="true"></div>
            <h1 class="headline">What can I help you<br>with today?</h1>
            <p class="subhead">Your private AI workspace — memory, documents and voice, in one place.</p>
        </section>

        <!-- Conversation -->
        <section class="chat-window" id="chatWindow">
            <div id="messages"></div>

            <!-- Typing Indicator -->
            <div class="typing hidden" id="typingIndicator">
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </section>

        <!-- Prompt Bar -->
        <section class="prompt-zone">

            <div class="prompt-bar" id="promptBar">

                <button class="tool-btn" id="attachBtn" aria-label="Upload document" title="Upload document">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="fileInput" hidden
                       accept=".pdf,.doc,.docx,.txt,.md,.csv">

                <textarea id="messageInput"
                          placeholder="Ask anything…"
                          rows="1"
                          autofocus></textarea>

                <button class="tool-btn" id="voiceBtn" aria-label="Voice mode" title="Voice mode">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                    </svg>
                </button>

                <button class="send-btn" id="sendBtn" aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"/>
                        <polyline points="5 12 12 5 19 12"/>
                    </svg>
                </button>

            </div>

            <p class="prompt-hint">Aura can make mistakes. Verify important information.</p>

        </section>

    </main>

    <!-- ================= Footer ================= -->
    <footer class="statusbar">
        <span class="pill"><span class="pill-dot ok"></span>Memory Connected</span>
        <span class="pill"><span class="pill-dot ok"></span>Planner Ready</span>
        <span class="pill pill-muted">v1.0</span>
    </footer>

</div>

<script src="static/js/app.js"></script>

</body>
</html>
